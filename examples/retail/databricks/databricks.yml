bundle:
  name: adea-retail

variables:
  catalog:
    description: "Unity Catalog name — matches src/databricks/00_common/utils.py's CATALOG constant."
    default: adea
  checkpoint_root:
    description: "ADLS path root for Auto Loader checkpoints."
    default: /mnt/adea/_checkpoints

resources:
  jobs:
    retail_medallion_pipeline:
      name: "ADEA Retail - Medallion Pipeline"
      tasks:
        # --- Bronze: one Auto Loader run per entity ---
        - task_key: bronze_customers
          notebook_task:
            notebook_path: ../../../src/databricks/01_bronze/01_Bronze_Autoloader_Ingest.py
            base_parameters:
              source_path: /mnt/adea/raw/retail/customers
              source_format: csv
              bronze_table: ${var.catalog}.bronze.retail_customers
              checkpoint_path: ${var.checkpoint_root}/bronze/retail_customers

        - task_key: bronze_products
          notebook_task:
            notebook_path: ../../../src/databricks/01_bronze/01_Bronze_Autoloader_Ingest.py
            base_parameters:
              source_path: /mnt/adea/raw/retail/products
              source_format: csv
              bronze_table: ${var.catalog}.bronze.retail_products
              checkpoint_path: ${var.checkpoint_root}/bronze/retail_products

        - task_key: bronze_inventory
          notebook_task:
            notebook_path: ../../../src/databricks/01_bronze/01_Bronze_Autoloader_Ingest.py
            base_parameters:
              source_path: /mnt/adea/raw/retail/inventory
              source_format: csv
              bronze_table: ${var.catalog}.bronze.retail_inventory
              checkpoint_path: ${var.checkpoint_root}/bronze/retail_inventory

        - task_key: bronze_orders
          notebook_task:
            notebook_path: ../../../src/databricks/01_bronze/01_Bronze_Autoloader_Ingest.py
            base_parameters:
              source_path: /mnt/adea/raw/retail/orders
              source_format: csv
              bronze_table: ${var.catalog}.bronze.retail_orders
              checkpoint_path: ${var.checkpoint_root}/bronze/retail_orders

        # --- Silver: generic cleanse/conform per entity ---
        - task_key: silver_customers
          depends_on:
            - task_key: bronze_customers
          notebook_task:
            notebook_path: ../../../src/databricks/02_silver/01_Silver_Conform_Generic.py
            base_parameters:
              bronze_table: ${var.catalog}.bronze.retail_customers
              silver_table: ${var.catalog}.silver.retail_customers
              natural_key_columns: customer_id

        - task_key: silver_products
          depends_on:
            - task_key: bronze_products
          notebook_task:
            notebook_path: ../../../src/databricks/02_silver/01_Silver_Conform_Generic.py
            base_parameters:
              bronze_table: ${var.catalog}.bronze.retail_products
              silver_table: ${var.catalog}.silver.retail_products
              natural_key_columns: product_id

        - task_key: silver_inventory
          depends_on:
            - task_key: bronze_inventory
          notebook_task:
            notebook_path: ../../../src/databricks/02_silver/01_Silver_Conform_Generic.py
            base_parameters:
              bronze_table: ${var.catalog}.bronze.retail_inventory
              silver_table: ${var.catalog}.silver.retail_inventory
              natural_key_columns: inventory_id

        - task_key: silver_orders
          depends_on:
            - task_key: bronze_orders
          notebook_task:
            notebook_path: ../../../src/databricks/02_silver/01_Silver_Conform_Generic.py
            base_parameters:
              bronze_table: ${var.catalog}.bronze.retail_orders
              silver_table: ${var.catalog}.silver.retail_orders
              natural_key_columns: order_id

        # --- Gold: dimensions (generic SCD Type 2 notebook) ---
        # Same gold.dim_customer / gold.dim_product tables banking's and
        # healthcare's bundles write patient/customer data into (distinguished
        # by source_system) — reused unmodified, same as the SQL path. See
        # README.md's "reconciliation gap" section for why product still
        # needs its own bespoke fact notebook below despite the dimension
        # itself needing zero changes.
        - task_key: gold_dim_customer
          depends_on:
            - task_key: silver_customers
          notebook_task:
            notebook_path: ../../../src/databricks/03_gold/02_Gold_Load_Dim_Scd2.py
            base_parameters:
              silver_table: ${var.catalog}.silver.retail_customers
              gold_table: ${var.catalog}.gold.dim_customer
              natural_key_columns: customer_id
              tracked_columns: first_name,last_name,email,phone,customer_segment

        - task_key: gold_dim_product
          depends_on:
            - task_key: silver_products
          notebook_task:
            notebook_path: ../../../src/databricks/03_gold/02_Gold_Load_Dim_Scd2.py
            base_parameters:
              silver_table: ${var.catalog}.silver.retail_products
              gold_table: ${var.catalog}.gold.dim_product
              natural_key_columns: product_id
              tracked_columns: product_name,category,subcategory,brand,unit_price,unit_cost

        # --- Gold: facts (retail-specific — see README.md's reconciliation gap) ---
        - task_key: gold_fact_orders
          depends_on:
            - task_key: silver_orders
            - task_key: gold_dim_customer
            - task_key: gold_dim_product
          notebook_task:
            notebook_path: ./gold_load_fact_orders_retail.py
            base_parameters:
              silver_table: ${var.catalog}.silver.retail_orders
              gold_table: ${var.catalog}.gold.fact_orders

        - task_key: gold_fact_inventory
          depends_on:
            - task_key: silver_inventory
            - task_key: gold_dim_product
          notebook_task:
            notebook_path: ./gold_load_fact_inventory_retail.py
            base_parameters:
              silver_table: ${var.catalog}.silver.retail_inventory
              gold_table: ${var.catalog}.gold.fact_inventory

targets:
  dev:
    mode: development
    default: true
