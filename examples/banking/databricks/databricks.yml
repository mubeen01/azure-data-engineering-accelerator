bundle:
  name: adea-banking

variables:
  catalog:
    description: "Unity Catalog name — matches src/databricks/00_common/utils.py's CATALOG constant."
    default: adea
  checkpoint_root:
    description: "ADLS path root for Auto Loader checkpoints."
    default: /mnt/adea/_checkpoints

resources:
  jobs:
    banking_medallion_pipeline:
      name: "ADEA Banking - Medallion Pipeline"
      tasks:
        # --- Bronze: one Auto Loader run per entity ---
        - task_key: bronze_customers
          notebook_task:
            notebook_path: ../../../src/databricks/01_bronze/01_Bronze_Autoloader_Ingest.py
            base_parameters:
              source_path: /mnt/adea/raw/banking/customers
              source_format: csv
              bronze_table: ${var.catalog}.bronze.banking_customers
              checkpoint_path: ${var.checkpoint_root}/bronze/banking_customers

        - task_key: bronze_accounts
          notebook_task:
            notebook_path: ../../../src/databricks/01_bronze/01_Bronze_Autoloader_Ingest.py
            base_parameters:
              source_path: /mnt/adea/raw/banking/accounts
              source_format: csv
              bronze_table: ${var.catalog}.bronze.banking_accounts
              checkpoint_path: ${var.checkpoint_root}/bronze/banking_accounts

        - task_key: bronze_loans
          notebook_task:
            notebook_path: ../../../src/databricks/01_bronze/01_Bronze_Autoloader_Ingest.py
            base_parameters:
              source_path: /mnt/adea/raw/banking/loans
              source_format: csv
              bronze_table: ${var.catalog}.bronze.banking_loans
              checkpoint_path: ${var.checkpoint_root}/bronze/banking_loans

        - task_key: bronze_transactions
          notebook_task:
            notebook_path: ../../../src/databricks/01_bronze/01_Bronze_Autoloader_Ingest.py
            base_parameters:
              source_path: /mnt/adea/raw/banking/transactions
              source_format: csv
              bronze_table: ${var.catalog}.bronze.banking_transactions
              checkpoint_path: ${var.checkpoint_root}/bronze/banking_transactions

        # --- Silver: generic cleanse/conform per entity ---
        - task_key: silver_customers
          depends_on:
            - task_key: bronze_customers
          notebook_task:
            notebook_path: ../../../src/databricks/02_silver/01_Silver_Conform_Generic.py
            base_parameters:
              bronze_table: ${var.catalog}.bronze.banking_customers
              silver_table: ${var.catalog}.silver.banking_customers
              natural_key_columns: customer_id

        - task_key: silver_accounts
          depends_on:
            - task_key: bronze_accounts
          notebook_task:
            notebook_path: ../../../src/databricks/02_silver/01_Silver_Conform_Generic.py
            base_parameters:
              bronze_table: ${var.catalog}.bronze.banking_accounts
              silver_table: ${var.catalog}.silver.banking_accounts
              natural_key_columns: account_id

        - task_key: silver_loans
          depends_on:
            - task_key: bronze_loans
          notebook_task:
            notebook_path: ../../../src/databricks/02_silver/01_Silver_Conform_Generic.py
            base_parameters:
              bronze_table: ${var.catalog}.bronze.banking_loans
              silver_table: ${var.catalog}.silver.banking_loans
              natural_key_columns: loan_id

        - task_key: silver_transactions
          depends_on:
            - task_key: bronze_transactions
          notebook_task:
            notebook_path: ../../../src/databricks/02_silver/01_Silver_Conform_Generic.py
            base_parameters:
              bronze_table: ${var.catalog}.bronze.banking_transactions
              silver_table: ${var.catalog}.silver.banking_transactions
              natural_key_columns: transaction_id

        # --- Gold: dimensions (generic SCD Type 2 notebook) ---
        # customer_id kept as a plain attribute on dim_account/dim_loan here
        # (not resolved to a surrogate customer_key) — only fact notebooks
        # do cross-dimension key resolution, see gold_load_fact_transactions_banking.py.
        - task_key: gold_dim_customer
          depends_on:
            - task_key: silver_customers
          notebook_task:
            notebook_path: ../../../src/databricks/03_gold/02_Gold_Load_Dim_Scd2.py
            base_parameters:
              silver_table: ${var.catalog}.silver.banking_customers
              gold_table: ${var.catalog}.gold.dim_customer
              natural_key_columns: customer_id
              tracked_columns: first_name,last_name,email,phone,customer_segment

        - task_key: gold_dim_account
          depends_on:
            - task_key: silver_accounts
            - task_key: gold_dim_customer
          notebook_task:
            notebook_path: ../../../src/databricks/03_gold/02_Gold_Load_Dim_Scd2.py
            base_parameters:
              silver_table: ${var.catalog}.silver.banking_accounts
              gold_table: ${var.catalog}.gold.dim_account
              natural_key_columns: account_id
              tracked_columns: customer_id,account_type,account_status,currency_code

        - task_key: gold_dim_loan
          depends_on:
            - task_key: silver_loans
            - task_key: gold_dim_customer
          notebook_task:
            notebook_path: ../../../src/databricks/03_gold/02_Gold_Load_Dim_Scd2.py
            base_parameters:
              silver_table: ${var.catalog}.silver.banking_loans
              gold_table: ${var.catalog}.gold.dim_loan
              natural_key_columns: loan_id
              tracked_columns: customer_id,loan_type,status

        # --- Gold: fact (banking-specific — resolves customer via account) ---
        - task_key: gold_fact_transactions
          depends_on:
            - task_key: silver_transactions
            - task_key: gold_dim_account
          notebook_task:
            notebook_path: ./gold_load_fact_transactions_banking.py
            base_parameters:
              silver_table: ${var.catalog}.silver.banking_transactions
              gold_table: ${var.catalog}.gold.fact_transactions

targets:
  dev:
    mode: development
    default: true
